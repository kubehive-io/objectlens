providers:
  - id: aws-prod
    name: AWS Production
    type: aws
    description: Production AWS object storage
    region: eu-west-1
    access_key_id: ${AWS_PROD_ACCESS_KEY_ID}
    secret_access_key: ${AWS_PROD_SECRET_ACCESS_KEY}
    verify_ssl: true
    tags:
      - production
      - aws

  - id: aws-backup
    name: AWS Backup
    type: aws
    description: Backup AWS account
    region: eu-west-1
    access_key_id: ${AWS_BACKUP_ACCESS_KEY_ID}
    secret_access_key: ${AWS_BACKUP_SECRET_ACCESS_KEY}
    verify_ssl: true
    tags:
      - backup
      - aws

  - id: aws-sandbox
    name: AWS Sandbox
    type: aws
    description: Sandbox AWS account
    region: eu-west-1
    access_key_id: ${AWS_SANDBOX_ACCESS_KEY_ID}
    secret_access_key: ${AWS_SANDBOX_SECRET_ACCESS_KEY}
    verify_ssl: true
    tags:
      - sandbox
      - aws

  - id: ceph-homelab
    name: Ceph Homelab
    type: ceph
    description: Homelab Ceph RGW cluster
    endpoint_url: http://ceph-rgw.local:7480
    region: us-east-1
    access_key_id: ${CEPH_HOMELAB_ACCESS_KEY_ID}
    secret_access_key: ${CEPH_HOMELAB_SECRET_ACCESS_KEY}
    verify_ssl: false
    tags:
      - homelab
      - ceph

  - id: ceph-lab
    name: Ceph Lab
    type: ceph
    description: Lab Ceph RGW cluster
    endpoint_url: http://ceph-lab-rgw.local:7480
    region: us-east-1
    access_key_id: ${CEPH_LAB_ACCESS_KEY_ID}
    secret_access_key: ${CEPH_LAB_SECRET_ACCESS_KEY}
    verify_ssl: false
    tags:
      - lab
      - ceph

  - id: garage-local
    name: Garage Local
    type: garage
    description: Local Garage provider for dev and air-gapped testing
    endpoint_url: http://localhost:3900
    region: garage
    access_key_id: ${GARAGE_LOCAL_ACCESS_KEY_ID}
    secret_access_key: ${GARAGE_LOCAL_SECRET_ACCESS_KEY}
    verify_ssl: false
    tags:
      - local
      - dev
