site_name: ObjectLens
site_description: Kubernetes-native object storage interface for fast Ceph object access
site_url: https://example.com/objectlens

theme:
  name: material
  logo: images/logo.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan

nav:
  - Overview:
      - Home: index.md
      - Getting Started: getting-started.md
      - Roadmap: roadmap.md
  - Architecture & Design:
      - System Overview: architecture.md
      - Provider Model: provider-model.md
      - Multi-Provider: multi-provider.md
      - Decisions (Provider Abstraction): decisions/0001-provider-abstraction.md
  - Features & Settings:
      - S3 Connection Settings: provider-settings.md
      - Bucket Insights: bucket-details.md
      - Ceph RGW: ceph-provider.md
      - Garage S3: garage-provider.md
  - Development:
      - Guide: development.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - toc:
      permalink: true
