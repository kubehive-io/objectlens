site_name: ObjectLens
site_description: Kubernetes-native object storage interface for fast Ceph object access
site_url: https://example.com/objectlens

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Provider Model: provider-model.md
  - Multi-Provider: multi-provider.md
  - Provider Settings: provider-settings.md
  - Bucket Details: bucket-details.md
  - Ceph Provider: ceph-provider.md
  - Garage Provider: garage-provider.md
  - Roadmap: roadmap.md
  - Development: development.md
  - Decisions:
      - Provider Abstraction: decisions/0001-provider-abstraction.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - toc:
      permalink: true
