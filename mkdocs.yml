site_name: ObjectLens
site_description: Kubernetes-native object storage interface for fast Ceph object access
site_url: https://example.com/objectlens
repo_name: GitHub
repo_url: https://github.com/kubehive-io/objectlens

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette:
    # 1. Automatic / System Preference Mode
    - media: "(prefers-color-scheme)"
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # 2. Light Mode (Default)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # 3. Dark Mode (Slate)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: getting-started.md
  - User Guide: user-guide.md
  - Telemetry: telemetry.md
  - MCP Server: mcp-server.md
  - Architecture & Design:
      - System Overview: architecture.md
      - Provider Model: provider-model.md
      - Multi-Provider: multi-provider.md
      - Decisions (Provider Abstraction): decisions/0001-provider-abstraction.md
  - Features & Settings:
      - S3 Connection Settings: provider-settings.md
      - Bucket Insights: bucket-details.md
      - Ceph RGW: ceph-provider.md
      - Garage S3: garage-provider.md
  - Development:
      - Guide: development.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - toc:
      permalink: true

extra:
  version:
    provider: mike
