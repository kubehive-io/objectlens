apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: objectlens
spec:
  replicas: 1
  selector:
    matchLabels:
      app: objectlens
      component: backend
  template:
    metadata:
      labels:
        app: objectlens
        component: backend
    spec:
      containers:
        - name: backend
          image: objectlens-backend:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: OBJECTLENS_DATABASE_URL
              value: sqlite:////data/objectlens.db
            - name: OBJECTLENS_PROVIDER
              value: ceph
            - name: OBJECTLENS_CORS_ORIGINS
              value: "http://localhost:3000"
          envFrom:
            - secretRef:
                name: objectlens-ceph
          volumeMounts:
            - name: metadata
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: metadata
          emptyDir: {}
