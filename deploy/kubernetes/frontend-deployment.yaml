apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: objectlens
spec:
  replicas: 1
  selector:
    matchLabels:
      app: objectlens
      component: frontend
  template:
    metadata:
      labels:
        app: objectlens
        component: frontend
    spec:
      containers:
        - name: frontend
          image: objectlens-frontend:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NUXT_PUBLIC_API_BASE_URL
              value: "http://backend.objectlens.svc.cluster.local:8000"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
