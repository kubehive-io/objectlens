services:
  backend:
    build:
      context: ./backend
    environment:
      OBJECTLENS_S3_ENDPOINT_URL: http://minio:9000
      OBJECTLENS_S3_REGION: us-east-1
      OBJECTLENS_S3_ACCESS_KEY_ID: minioadmin
      OBJECTLENS_S3_SECRET_ACCESS_KEY: minioadmin
      OBJECTLENS_S3_BUCKET: objectlens-demo
      OBJECTLENS_DATABASE_URL: sqlite:////data/objectlens.db
      OBJECTLENS_CORS_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - objectlens-data:/data
    ports:
      - "8000:8000"
    depends_on:
      - minio

  frontend:
    build:
      context: ./frontend
    environment:
      NUXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  create-demo-bucket:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/objectlens-demo;
      echo '{\"hello\":\"objectlens\"}' > /tmp/example.json;
      mc cp /tmp/example.json local/objectlens-demo/examples/example.json;
      "

volumes:
  objectlens-data:
  minio-data:
