apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "objectlens.fullname" . }}-frontend
  labels:
    {{- include "objectlens.labels" . | nindent 4 }}
    component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "objectlens.selectorLabels" . | nindent 6 }}
      component: frontend
  template:
    metadata:
      labels:
        {{- include "objectlens.selectorLabels" . | nindent 8 }}
        component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: 3000
          env:
            - name: NUXT_PUBLIC_API_BASE_URL
              value: {{ .Values.frontend.env.apiBaseUrl | default (printf "http://%s-backend:%d" (include "objectlens.fullname" .) (.Values.backend.service.port | int)) | quote }}
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
