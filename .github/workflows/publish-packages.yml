name: Publish Packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate versions
        run: |
          CHART_VERSION=$(grep '^version:' chart/Chart.yaml | awk '{print $2}')
          echo "Chart version: ${CHART_VERSION}"
          
          if [[ "${{ github.event_name }}" == "release" ]]; then
            RELEASE_VERSION="${{ github.event.release.tag_name }}"
            RELEASE_VERSION="${RELEASE_VERSION#v}"
            echo "Release version: ${RELEASE_VERSION}"
            
            if [[ "${CHART_VERSION}" != "${RELEASE_VERSION}" ]]; then
              echo "ERROR: Helm chart version (${CHART_VERSION}) does not match the GitHub Release tag version (${RELEASE_VERSION})!"
              exit 1
            fi
            echo "SUCCESS: Helm chart version matches release version!"
          else
            echo "Skipping validation: not triggered by a release event"
          fi

  build-and-push-images:
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase repository owner
        id: owner
        run: |
          echo "name=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.name }}/service
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=sha,format=short

      - name: Build and push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.name }}/web-ui
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=sha,format=short

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cancel Workflow on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.cancelWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });

  build-and-push-chart:
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase repository owner
        id: owner
        run: |
          echo "name=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Log in to GHCR for Helm
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Calculate chart version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Use git tag stripped of leading 'v'
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Use base version from Chart.yaml and append -dev.<run_number>
            BASE_VERSION=$(grep '^version:' chart/Chart.yaml | awk '{print $2}')
            VERSION="${BASE_VERSION}-dev.${{ github.run_number }}"
          fi
          echo "value=${VERSION}" >> $GITHUB_OUTPUT

      - name: Package and Push Helm Chart
        run: |
          CHART_NAME=$(grep '^name:' chart/Chart.yaml | awk '{print $2}')
          echo "Discovered Chart Name: ${CHART_NAME}"
          
          # Package the chart
          helm package chart/ --version "${{ steps.version.outputs.value }}" --destination .
          
          # Push the generated package
          helm push "${CHART_NAME}-${{ steps.version.outputs.value }}.tgz" "oci://ghcr.io/${{ steps.owner.outputs.name }}"

      - name: Cancel Workflow on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.cancelWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });

  publish-success:
    needs: [validate-version, build-and-push-images, build-and-push-chart]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase repository owner
        id: owner
        run: |
          echo "name=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Calculate version tags
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            BASE_VERSION=$(grep '^version:' chart/Chart.yaml | awk '{print $2}')
            VERSION="${BASE_VERSION}-dev.${{ github.run_number }}"
          fi
          echo "tag=${VERSION}" >> $GITHUB_OUTPUT

      - name: Announce success
        run: |
          OWNER="${{ steps.owner.outputs.name }}"
          TAG="${{ steps.version.outputs.tag }}"
          CHART_NAME=$(grep '^name:' chart/Chart.yaml | awk '{print $2}')
          
          echo "=================================================="
          echo "🎉 SUCCESS: All packages published successfully!"
          echo "📦 Registry:  ghcr.io/${OWNER}"
          echo "🏷️ Version:   ${TAG}"
          echo "🚀 Artifacts published:"
          echo "   - Container Service:  ghcr.io/${OWNER}/service:${TAG}"
          echo "   - Container Web UI:   ghcr.io/${OWNER}/web-ui:${TAG}"
          echo "   - Helm Chart OCI:     oci://ghcr.io/${OWNER}/${CHART_NAME}:${TAG}"
          echo "=================================================="

  cleanup-on-failure:
    needs: [validate-version, build-and-push-images, build-and-push-chart]
    if: always() && (contains(needs.build-and-push-images.result, 'failure') || contains(needs.build-and-push-chart.result, 'failure') || contains(needs.build-and-push-images.result, 'cancelled') || contains(needs.build-and-push-chart.result, 'cancelled'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase repository owner
        id: owner
        run: |
          echo "name=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Calculate version tags
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            BASE_VERSION=$(grep '^version:' chart/Chart.yaml | awk '{print $2}')
            VERSION="${BASE_VERSION}-dev.${{ github.run_number }}"
          fi
          echo "tag=${VERSION}" >> $GITHUB_OUTPUT

      - name: Clean up published packages from GHCR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ steps.owner.outputs.name }}"
          TAG="${{ steps.version.outputs.tag }}"
          
          cleanup_package() {
            local package=$1
            local tag=$2
            local owner=$3
            echo "Checking package: ${package}:${tag}..."
            
            local versions_json
            versions_json=$(gh api "/orgs/${owner}/packages/container/${package}/versions" 2>/dev/null || gh api "/users/${owner}/packages/container/${package}/versions" 2>/dev/null || echo "[]")
            
            if [[ "${versions_json}" == "[]" ]]; then
              echo "No versions found for ${package}."
              return 0
            fi
            
            local version_id
            version_id=$(echo "${versions_json}" | jq -r --arg tag "${tag}" '.[] | select(.metadata.container.tags[]? == $tag) | .id')
            
            if [[ -n "${version_id}" && "${version_id}" != "null" ]]; then
              echo "Found version ID ${version_id} for tag ${tag}. Deleting..."
              gh api --method DELETE "/orgs/${owner}/packages/container/${package}/versions/${version_id}" 2>/dev/null || \
              gh api --method DELETE "/users/${owner}/packages/container/${package}/versions/${version_id}" 2>/dev/null || \
              echo "Failed to delete package version."
              echo "Successfully deleted ${package}:${tag}."
            else
              echo "No matching version found for tag ${tag}."
            fi
          }
          
          CHART_NAME=$(grep '^name:' chart/Chart.yaml | awk '{print $2}')
          echo "Cleaning up possible failed release artifacts..."
          
          cleanup_package "service" "${TAG}" "${OWNER}"
          cleanup_package "web-ui" "${TAG}" "${OWNER}"
          cleanup_package "${CHART_NAME}" "${TAG}" "${OWNER}"
