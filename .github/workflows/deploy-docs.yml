name: Deploy Docs

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material mike

      - name: Build and deploy documentation
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Use git tag stripped of leading 'v'
            VERSION="${GITHUB_REF_NAME#v}"
            echo "Deploying version: ${VERSION}"
            
            # Check if this is a pre-release/release candidate (contains -rc, -alpha, -beta, etc.)
            if [[ "${VERSION}" =~ -rc|-alpha|-beta|-pre|rc|alpha|beta ]]; then
              echo "Pre-release/RC detected. Deploying version without updating 'latest' alias."
              mike deploy --branch github-doc --push "${VERSION}"
            else
              echo "Stable release detected. Deploying and updating 'latest' alias."
              mike deploy --branch github-doc --push --update-aliases "${VERSION}" latest
              mike set-default --branch github-doc --push latest
            fi
          else
            echo "Deploying dev version"
            mike deploy --branch github-doc --push dev
            
            # Ensure a default redirect is set so root / redirects correctly
            # If 'latest' exists, set default to 'latest'. If not, set default to 'dev'.
            if mike list -b github-doc 2>/dev/null | grep -q "latest"; then
              echo "Setting default redirect to latest"
              mike set-default --branch github-doc --push latest
            else
              echo "latest alias not found. Setting default redirect to dev"
              mike set-default --branch github-doc --push dev
            fi
          fi
