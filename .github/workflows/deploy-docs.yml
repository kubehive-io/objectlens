name: Deploy Docs

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material mike

      - name: Build and deploy documentation
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Use git tag stripped of leading 'v'
            VERSION="${GITHUB_REF_NAME#v}"
            echo "Deploying release version: ${VERSION}"
            mike deploy --branch github-doc --push --update-aliases "${VERSION}" latest
            mike set-default --branch github-doc --push latest
          else
            echo "Deploying dev version"
            mike deploy --branch github-doc --push dev
          fi
